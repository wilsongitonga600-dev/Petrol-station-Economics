kind = "web"
previewPath = "/"
title = "Shift Reconciliation"
version = "1.0.0"
id = "artifacts/shift-recon"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20130

[services.development]
run = "pnpm --filter @workspace/shift-recon run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shift-recon", "run", "build" ]
publicDir = "artifacts/shift-recon/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20130"
BASE_PATH = "/"
