kind = "mobile"
previewPath = "/shift-recon-mobile/"
title = "Shift Recon Mobile"
version = "1.0.0"
id = "artifacts/shift-recon-mobile"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/shift-recon-mobile/" ]
localPort = 24329

[services.development]
run = "pnpm --filter @workspace/shift-recon-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shift-recon-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/shift-recon-mobile", "run", "serve" ]

[services.env]
PORT = "24329"
BASE_PATH = "/shift-recon-mobile/"
