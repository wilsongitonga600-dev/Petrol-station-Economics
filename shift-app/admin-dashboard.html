<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Admin Dashboard — Shift Reconciliation</title>
<style>
  :root {
    --bg: #12151D; --panel: #1B1F29; --panel-dark: #0D0F15; --border: #2A2F3C;
    --text: #F2F0EB; --muted: #8B92A0; --muted2: #6B7280;
    --shell-red: #ED1C24; --shell-yellow: #FDCC00; --teal: #4FB0C6; --green: #4FBE71;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 20px; padding-bottom: 60px;
  }
  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
  .topbar h1 { font-size: 18px; margin: 0 0 2px; }
  .topbar p { margin: 0; color: var(--muted); font-size: 13px; }
  .logout-btn {
    background: var(--panel-dark); border: 1px solid var(--border); color: var(--muted);
    border-radius: 8px; padding: 8px 12px; font-size: 12.5px; cursor: pointer;
  }
  .nav-row { display: flex; gap: 8px; margin-bottom: 22px; }
  .nav-row a {
    flex: 1; text-align: center; background: var(--panel-dark); border: 1px solid var(--border);
    color: var(--text); text-decoration: none; padding: 10px; border-radius: 10px; font-size: 12.5px; font-weight: 600;
  }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px; }
  .stat-card { background: var(--panel-dark); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
  .stat-card .k { display: block; color: var(--muted); font-size: 11.5px; margin-bottom: 6px; }
  .stat-card .v { font-size: 17px; font-weight: 700; font-family: 'SF Mono', Consolas, monospace; }
  .section-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin: 22px 0 10px; }
  .row-item {
    background: var(--panel-dark); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
  }
  .row-item .primary { font-size: 13px; font-weight: 600; }
  .row-item .secondary { font-size: 11.5px; color: var(--muted); font-family: monospace; }
  .row-item .value { font-family: monospace; font-weight: 700; font-size: 13px; }
  .empty { color: var(--muted2); font-size: 13px; text-align: center; padding: 20px 0; }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>Station Overview</h1>
    <p id="adminName">Admin dashboard</p>
  </div>
  <button class="logout-btn" onclick="logout()">Log out</button>
</div>

<div class="nav-row">
  <a href="admin-users.html">👥 Manage attendants</a>
</div>

<div class="stat-grid">
  <div class="stat-card"><span class="k">Total attendants</span><span class="v" id="stAttendants">0</span></div>
  <div class="stat-card"><span class="k">Active users</span><span class="v" id="stActive" style="color:var(--teal);">0</span></div>
  <div class="stat-card"><span class="k">Today's shifts</span><span class="v" id="stTodayShifts">0</span></div>
  <div class="stat-card"><span class="k">Monthly fuel sales</span><span class="v" id="stMonthSales" style="color:var(--shell-yellow);">KES 0</span></div>
  <div class="stat-card"><span class="k">Station revenue (month)</span><span class="v" id="stRevenue" style="color:var(--green);">KES 0</span></div>
  <div class="stat-card"><span class="k">Net variance (month)</span><span class="v" id="stNetVar">KES 0</span></div>
</div>

<div class="section-title">Recent reconciliations (all attendants)</div>
<div id="recentAll"></div>

<div class="section-title">Top shortages this month</div>
<div id="topShortages"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js?v=2"></script>
<script src="auth-guard.js"></script>
<script>
  (async function init() {
    const profile = await requireAuth('admin');
    if (!profile) return;
    document.getElementById('adminName').textContent = `Signed in as ${profile.full_name}`;

    // Attendant counts
    const { data: attendants } = await supabase.from('profiles').select('id, active').eq('role', 'attendant');
    document.getElementById('stAttendants').textContent = attendants ? attendants.length : 0;
    document.getElementById('stActive').textContent = attendants ? attendants.filter((a) => a.active).length : 0;

    const now = new Date();
    const monthStart = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-01`;
    const todayStr = now.toISOString().slice(0, 10);

    // Month-wide shifts (RLS lets admin see all rows)
    const { data: monthShifts } = await supabase
      .from('shift_reconciliations')
      .select('*, profiles(full_name)')
      .gte('shift_date', monthStart)
      .lte('shift_date', todayStr)
      .order('shift_date', { ascending: false });

    const shifts = monthShifts || [];
    const todayCount = shifts.filter((s) => s.shift_date === todayStr).length;
    const totalSales = shifts.reduce((s, r) => s + Number(r.total_fuel_sales), 0);
    const totalMoney = shifts.reduce((s, r) => s + Number(r.total_money), 0);
    const netVariance = totalMoney - totalSales;

    document.getElementById('stTodayShifts').textContent = todayCount;
    document.getElementById('stMonthSales').textContent = `KES ${totalSales.toLocaleString('en-KE', { maximumFractionDigits: 0 })}`;
    document.getElementById('stRevenue').textContent = `KES ${totalMoney.toLocaleString('en-KE', { maximumFractionDigits: 0 })}`;
    const netEl = document.getElementById('stNetVar');
    netEl.textContent = `${netVariance >= 0 ? '+' : '\u2212'}KES ${Math.abs(netVariance).toLocaleString('en-KE', { maximumFractionDigits: 0 })}`;
    netEl.style.color = Math.abs(netVariance) < 1 ? 'var(--teal)' : netVariance > 0 ? 'var(--green)' : 'var(--shell-red)';

    // Recent reconciliations, across everyone
    const recentEl = document.getElementById('recentAll');
    const recent = shifts.slice(0, 10);
    recentEl.innerHTML = recent.length === 0
      ? '<p class="empty">No shifts logged this month yet.</p>'
      : recent.map((r) => {
          const v = Number(r.variance);
          const color = Math.abs(v) < 1 ? 'var(--teal)' : v > 0 ? 'var(--green)' : 'var(--shell-red)';
          return `<div class="row-item">
            <div>
              <div class="primary">${r.profiles?.full_name || 'Unknown'}</div>
              <div class="secondary">${r.shift_date} · ${r.shift_name}</div>
            </div>
            <div class="value" style="color:${color};">${v >= 0 ? '+' : '\u2212'}KES ${Math.abs(v).toLocaleString('en-KE', { maximumFractionDigits: 0 })}</div>
          </div>`;
        }).join('');

    // Top shortages
    const shortagesEl = document.getElementById('topShortages');
    const shortages = shifts
      .filter((r) => Number(r.variance) < -1)
      .sort((a, b) => Number(a.variance) - Number(b.variance))
      .slice(0, 5);
    shortagesEl.innerHTML = shortages.length === 0
      ? '<p class="empty">No shortages this month. 🎉</p>'
      : shortages.map((r) => `<div class="row-item">
          <div>
            <div class="primary">${r.profiles?.full_name || 'Unknown'}</div>
            <div class="secondary">${r.shift_date} · ${r.shift_name}</div>
          </div>
          <div class="value" style="color:var(--shell-red);">\u2212KES ${Math.abs(Number(r.variance)).toLocaleString('en-KE', { maximumFractionDigits: 0 })}</div>
        </div>`).join('');
  })();
</script>
</body>
</html>
